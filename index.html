<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Commander Chronicle</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CommanderLog">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
<link rel="apple-touch-icon" href="https://oscarecrespo.github.io/CommanderLog/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================
   DESIGN SYSTEM
   ============================================ */
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --surface3: #222235;
  --border: #2a2a40; --border-bright: #3a3a58; --gold: #c9a84c; --gold-dim: #7a6530;
  --gold-bright: #e8c46a; --crimson: #8b1a1a; --crimson-bright: #c0392b;
  --mana-W: #f9f6e8; --mana-U: #4a90d9; --mana-B: #9b59b6; --mana-R: #e74c3c;
  --mana-G: #27ae60; --text: #e8e0cc; --text-dim: #9a9080; --text-faint: #5a5448;
  --win: #27ae60; --loss: #c0392b; --radius: 4px; --glow: 0 0 20px rgba(201,168,76,0.15);
}

body.light-theme {
  --bg: #f4f1ea; --surface: #ffffff; --surface2: #f0ece0; --surface3: #e8e3d5;
  --border: #d4cdb8; --border-bright: #b8b0a0; --gold: #8a6a1a; --text: #2a2418;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Crimson Pro', serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
h1, h2, h3, h4 { font-family: 'Cinzel', serif; letter-spacing: 0.05em; color: var(--gold); }

/* LAYOUT */
.top-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
.main-content { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }

/* AUTH */
#auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.auth-box { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--gold); padding: 2.5rem; position: relative; }
.auth-tabs { display: flex; margin-bottom: 1.5rem; border: 1px solid var(--border); }
.auth-tab { flex: 1; padding: 0.6rem; background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-family: 'Cinzel'; font-size: 0.8rem; }
.auth-tab.active { background: var(--surface3); color: var(--gold); }

/* UTILS */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.7rem 1.5rem; border: 1px solid var(--gold-dim); background: transparent; color: var(--gold); font-family: 'Cinzel'; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; }
.btn:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }
.btn-primary { background: rgba(201,168,76,0.15); width: 100%; }
.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.4rem; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 0.65rem; color: var(--text); border-radius: var(--radius); outline: none; }
.hidden { display: none !important; }

/* DASHBOARD & DECKS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); padding: 1.2rem; text-align: center; }
.stat-value { font-family: 'Cinzel'; font-size: 2rem; color: var(--gold); }
.decks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }
.deck-card { background: var(--surface2); border: 1px solid var(--border); padding: 1.3rem; cursor: pointer; border-radius: var(--radius); }
.ai-content { background: var(--surface2); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); font-size: 1rem; line-height: 1.8; white-space: pre-wrap; }
.roast { border-color: var(--crimson); background: rgba(139,26,26,0.05); }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Enter Hall</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Join Hall</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Name</label><input type="text" id="login-name"></div>
      <div class="form-group"><label>PIN</label><input type="password" id="login-pin"></div>
      <button class="btn btn-primary" onclick="login()">Enter the Hall</button>
    </div>
    <div id="register-form" class="hidden">
      <div class="form-group"><label>Name</label><input type="text" id="reg-name"></div>
      <div class="form-group"><label>PIN</label><input type="password" id="reg-pin"></div>
      <div class="form-group"><label>Confirm PIN</label><input type="password" id="reg-pin2"></div>
      <button class="btn btn-primary" onclick="register()">Join the Hall</button>
    </div>
    <div id="auth-error" class="hidden" style="color:var(--crimson); margin-top:1rem; text-align:center; font-size:0.85rem;"></div>
  </div>
</div>

<div id="app" class="hidden">
  <nav class="top-nav">
    <div class="nav-brand">⚔ Commander Chronicle <span id="nav-username" style="font-size:0.8rem; color:var(--text-dim);"></span></div>
    <div style="display:flex; gap:1rem;">
        <button class="btn" style="padding:4px 10px; font-size:0.7rem;" onclick="showTab('dashboard')">Dashboard</button>
        <button class="btn" style="padding:4px 10px; font-size:0.7rem;" onclick="showTab('decks')">Decks</button>
        <button class="btn" style="padding:4px 10px; font-size:0.7rem; border-color:var(--crimson);" onclick="logout()">Exit</button>
    </div>
  </nav>

  <div class="main-content">
    <div id="tab-dashboard" class="tab-content">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Games</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-wr" style="color:var(--win);">0%</div><div class="stat-label">Win Rate</div></div>
      </div>
      <div class="panel"><h3>Recent Chronicles</h3><div id="recent-games" style="margin-top:1rem;"></div></div>
    </div>

    <div id="tab-decks" class="tab-content hidden">
      <div class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Your Arsenal</h3>
            <button class="btn" onclick="openImport()">+ Import Deck</button>
        </div>
        <div id="decks-grid" class="decks-grid" style="margin-top:1.5rem;"></div>
      </div>
    </div>

    <div id="tab-deck-detail" class="tab-content hidden">
      <button class="btn" style="margin-bottom:1rem;" onclick="showTab('decks')">← Back</button>
      <div id="deck-detail-content"></div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://cc-proxy.oscar-crespom.workers.dev';

// Standardized Request: All data in Body to avoid CORS header blocks
async function sbRequest(path, method = 'GET', body = null, params = '') {
  const payload = { target: 'supabase', method, path, params, payload: body };
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("Connection Refused");
    return await res.json();
  } catch (e) {
    console.error(e);
    throw e;
  }
}

async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin + 'commander_chronicle_salt');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

let currentUser = null, allDecks = [], allGames = [];

function switchAuthTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
}

async function login() {
  const name = document.getElementById('login-name').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const err = document.getElementById('auth-error');
  err.classList.add('hidden');

  try {
    const pinHash = await hashPin(pin);
    const users = await sbRequest('users', 'GET', null, `?username=eq.${encodeURIComponent(name)}&pin_hash=eq.${pinHash}&select=*`);
    if (users?.length) setCurrentUser(users[0]);
    else { err.textContent = "Access Denied."; err.classList.remove('hidden'); }
  } catch (e) { err.textContent = "The Hall is unreachable."; err.classList.remove('hidden'); }
}

function setCurrentUser(user) {
  currentUser = user;
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('nav-username').textContent = ` — ${user.username}`;
  loadData();
}

async function loadData() {
  allDecks = await sbRequest('decks', 'GET', null, `?user_id=eq.${currentUser.id}&select=*`) || [];
  allGames = await sbRequest('games', 'GET', null, `?user_id=eq.${currentUser.id}&order=played_at.desc`) || [];
  renderDashboard();
  renderDecks();
}

function renderDashboard() {
  document.getElementById('stat-total').textContent = allGames.length;
  const wins = allGames.filter(g => g.result === 'win').length;
  document.getElementById('stat-wr').textContent = allGames.length ? ((wins/allGames.length)*100).toFixed(0) + '%' : '0%';
}

function renderDecks() {
  const grid = document.getElementById('decks-grid');
  grid.innerHTML = allDecks.map(d => `
    <div class="deck-card" onclick="showDeckDetail('${d.id}')">
      <h3 style="font-size:1.1rem;">${esc(d.name)}</h3>
      <p style="font-style:italic; font-size:0.85rem; color:var(--text-dim);">${esc(d.commander)}</p>
    </div>
  `).join('');
}

function showDeckDetail(id) {
  const deck = allDecks.find(d => d.id === id);
  showTab('deck-detail');
  document.getElementById('deck-detail-content').innerHTML = `
    <div class="panel">
        <h2>${esc(deck.name)}</h2>
        <p class="italic" style="margin-bottom:1.5rem;">${esc(deck.commander)}</p>
        <div style="display:grid; gap:1.5rem;">
            <div><h4>Intelligence Brief</h4><div class="ai-content">${renderMD(deck.intelligence_brief)}</div></div>
            <div><h4>The Roast 🔥</h4><div class="ai-content roast">${renderMD(deck.deck_roast)}</div></div>
        </div>
    </div>
  `;
}

function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
}

function renderMD(t) {
  if (!t) return "No data generated yet.";
  return t.replace(/^## (.*$)/gm, '<h3 style="color:var(--gold); margin-top:1rem;">$1</h3>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');
}

function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
function logout() { location.reload(); }
</script>
</body>
</html>
